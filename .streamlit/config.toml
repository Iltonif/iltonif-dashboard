# Tema base oscuro de ILTONIF — hace que los widgets nativos (desplegables,
# calendarios, menús emergentes) hereden la paleta en vez del blanco por
# defecto, que rompía la estética en los popups.
[theme]
base = "dark"
primaryColor = "#1d6af5"
backgroundColor = "#05070f"
secondaryBackgroundColor = "#0b1120"
textColor = "#e2e8f0"
font = "sans serif"
 
[server]
enableCORS = false
 
[client]
showSidebarNavigation = false
 
